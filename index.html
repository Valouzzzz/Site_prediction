<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prédiction Film</title>

<style>
body {
    background: linear-gradient(135deg, #0f172a, #1e293b);
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    color: white;
}

h1 {
    text-align: center;
    margin: 20px;
}

/* layout */
.main {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 25px;
    padding: 20px;
}

/* cartes */
.card {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    border-radius: 15px;
    padding: 20px;
    width: 350px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

/* inputs */
.field {
    margin-top: 12px;
}

label {
    font-size: 0.85em;
    opacity: 0.8;
}

input {
    width: 100%;
    margin-top: 5px;
    padding: 8px;
    border-radius: 6px;
    border: none;
    background: #252f3e;
    color: white;
}

/* dropdown */
.dropdown {
    background: #1e293b;
    border-radius: 6px;
    margin-top: 5px;
    max-height: 120px;
    overflow-y: auto;
}

.dropdown div {
    padding: 6px;
    cursor: pointer;
}

.dropdown div:hover {
    background: #38bdf8;
}

/* tags */
.tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 6px;
}

.tag {
    background: #38bdf8;
    color: black;
    padding: 5px 8px;
    border-radius: 20px;
    display: flex;
    gap: 5px;
    font-size: 0.8em;
}

.tag span {
    cursor: pointer;
    font-weight: bold;
}

/* bouton */
#valide {
    width: 100%;
    margin-top: 20px;
    padding: 10px;
    border-radius: 8px;
    border: none;
    background: linear-gradient(90deg, #38bdf8, #6366f1);
    color: white;
    font-weight: bold;
    cursor: pointer;
}

/* résultats */
.result {
    text-align: center;
}

#note {
    color: #38bdf8;
    font-size: 1.2em;
    font-weight: bold;
}

#Recette {
    color: #4ade80;
    font-size: 1.2em;
}

/* mobile */
@media (max-width: 768px) {
    .main {
        flex-direction: column;
        align-items: center;
    }
}
</style>
</head>

<body>

<h1>🎬 Prédiction Film</h1>

<div class="main">

<div class="card">

<div class="field">
<label>Titre</label>
<input id="titre">
</div>

<div class="field">
<label>Durée (minutes)</label>
<input id="duree" type="number" value="120">
</div>

<div class="field">
<label>Budget</label>
<input id="budget" type="number" value="10000000">
</div>

<div class="field">
<label>Réalisateurs</label>
<input id="realisateurs" value="James Cameron">
</div>

<div class="field">
<label>Casting</label>
<input id="casting" value="Brad Pitt, Damson Idris, ...">
</div>

<!-- PAYS -->
<div class="field">
<label>Pays</label>
<input id="recherchePays" placeholder="Rechercher...">
<div id="paysSelect" class="dropdown"></div>
<div id="paysTags" class="tags"></div>
</div>

<!-- GENRES -->
<div class="field">
<label>Genres</label>
<input id="rechercheGenres" placeholder="Rechercher...">
<div id="genresSelect" class="dropdown"></div>
<div id="genresTags" class="tags"></div>
</div>

<div class="field">
<label>Date de sortie</label>
<input id="dateSortie" type="date">
</div>

<button id="valide">Prédire</button>

</div>

<div class="card result">
<h2>Note</h2>
<p id="note">...</p>

<h2>Recette</h2>
<p id="Recette">...</p>
</div>

</div>

<script>
function setupAutocomplete(inputId, dropdownId, tagsId, dataList) {
    const input = document.getElementById(inputId);
    const dropdown = document.getElementById(dropdownId);
    const tagsContainer = document.getElementById(tagsId);

    let selected = [];

    input.addEventListener('input', () => {
        const value = input.value.toLowerCase();
        dropdown.innerHTML = '';

        if (!value) return;

        dataList
            .filter(item => item.toLowerCase().includes(value))
            .slice(0, 8)
            .forEach(item => {
                const option = document.createElement('div');
                option.textContent = item;

                option.onclick = () => {
                    if (!selected.includes(item)) {
                        selected.push(item);
                        renderTags();
                    }
                    input.value = '';
                    dropdown.innerHTML = '';
                };

                dropdown.appendChild(option);
            });
    });

    function renderTags() {
        tagsContainer.innerHTML = '';

        selected.forEach(item => {
            const tag = document.createElement('div');
            tag.className = 'tag';
            tag.innerHTML = `${item} <span>x</span>`;

            tag.querySelector('span').onclick = () => {
                selected = selected.filter(i => i !== item);
                renderTags();
            };

            tagsContainer.appendChild(tag);
        });
    }

    return () => selected.join(', ');
}

/* données */
const listePays = ['United States of America', 'Australia', 'Algeria', 'Egypt', 'France', 'United Kingdom', 'Canada', 'Germany', 'Italy', 'Japan', 'Thailand', 'Denmark', 'Mexico', 'Czech Republic', 'Hong Kong', 'Belgium', 'Estonia', 'Finland', 'Sweden', 'Ukraine', 'Russia', 'Monaco', 'Spain', 'South Korea', 'Poland', 'Brazil', 'Luxembourg', '', 'China', 'Indonesia', 'Saudi Arabia', 'Israel', 'Morocco', 'Afghanistan', 'India', 'New Zealand', 'Switzerland', 'Holy See', 'Soviet Union', 'Hungary', 'Serbia', 'Romania', 'United Arab Emirates', 'Netherlands', 'Yugoslavia', 'Portugal', 'South Africa', 'Norway', 'Ireland', 'Turkey', 'Argentina', 'Austria', 'Latvia', 'Lithuania', 'Puerto Rico', 'Kenya', 'Cyprus', 'Greece', 'Bahamas', 'Taiwan', 'Bulgaria', 'Colombia', 'Vietnam', 'Iran', 'Bangladesh', 'Tunisia', 'Chile', 'Singapore', 'Qatar', 'Iceland', 'Czechoslovakia', 'Cambodia', 'Philippines', 'Serbia and Montenegro', 'Syrian Arab Republic', 'Malaysia', 'Dominican Republic', 'Peru', 'Liechtenstein', 'Venezuela', 'Lebanon', 'Slovakia', 'Uzbekistan', 'Guadaloupe', 'East Germany', 'Cuba', 'Georgia', 'Mauritius', 'Zimbabwe', 'Solomon Islands', 'Belarus', 'Ecuador', 'Senegal', 'Angola', 'Congo', 'Bolivia', 'Aruba', 'Haiti', 'Netherlands Antilles', 'Bosnia and Herzegovina', 'Jamaica', 'Uruguay', 'Libyan Arab Jamahiriya', 'Kuwait', "Cote D'Ivoire", 'Botswana', 'Costa Rica', 'Nicaragua', 'Martinique', 'Panama', 'St. Kitts and Nevis', 'North Korea', 'Montenegro', 'Burkina Faso', 'Mali', 'Ghana', 'Sri Lanka', 'Namibia', 'Barbados', 'Croatia', 'Malta', 'Slovenia', 'Guinea', 'Macedonia', 'Kazakhstan', 'Albania', 'Palestinian Territory', 'Malawi', 'Jordan', 'Central African Republic', 'Pakistan', 'Ethiopia', 'French Polynesia', 'New Caledonia', 'Nigeria', 'Kosovo', 'Iraq', 'Uganda', 'Mongolia', 'Cook Islands', 'Bhutan', 'Armenia', 'Cameroon', 'Bahrain', 'Tanzania', 'Myanmar', 'Madagascar', 'Rwanda', 'Cayman Islands', 'Guatemala', 'Macao', 'Liberia', 'Honduras', 'Timor-Leste', 'Chad', 'El Salvador', 'Paraguay', 'Turks and Caicos Islands', 'Papua New Guinea', 'Faeroe Islands', 'Zambia', 'Mauritania', 'Nepal', 'Gabon', 'Azerbaijan', 'Yemen', 'Greenland', 'Moldova', 'Oman', 'Sudan'];  
const listeGenres = ['Comédie', 'Animation', 'Documentaire', 'Crime', 'Drame', 'Action', 'Histoire', 'Musique', 'Romance', 'Mystère', 'Thriller', 'Western', 'Science-Fiction', 'Familial', 'Fantastique', 'Aventure', 'Horreur', 'Guerre', 'Téléfilm', ''];

/* init */
const getPays = setupAutocomplete('recherchePays','paysSelect','paysTags',listePays);
const getGenres = setupAutocomplete('rechercheGenres','genresSelect','genresTags',listeGenres);

/* API */
document.getElementById('valide').addEventListener('click', async function(event) {
    event.preventDefault();

    const data = {
        titre: document.getElementById('titre').value,
        duree: document.getElementById('duree').value,
        budget: document.getElementById('budget').value,
        realisateurs: document.getElementById('realisateurs').value,
        casting: document.getElementById('casting').value,
        pays: getPays(),
        genres: getGenres(),
        date_sortie: document.getElementById('dateSortie').value
    };

    try {
        const res = await fetch('https://swiftly-tiara-vividly.ngrok-free.dev/predict', {
            method: 'POST',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify(data)
        });

        const result = await res.json();
        const note = parseFloat(result.note);

        let texte = '';
        if (note <= 3) texte = "Pas aimé 😬";
        else if (note <= 5) texte = "Moyen 🤔";
        else if (note <= 7) texte = "Bien 👍";
        else if (note <= 9) texte = "Très bien 🔥";
        else texte = "Excellent 🚀";

        document.getElementById('note').innerHTML = texte + " (" + note + "/10)";
        document.getElementById('Recette').innerHTML = result.recette + " $";

    } catch (err) {
        console.error(err);
    }
});
</script>

</body>
</html>
